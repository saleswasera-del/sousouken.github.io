  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // ============================================================

    const quizBank = {
      consulting: {
        name: 'コンサル', nameEn: 'CONSULTING', description: '戦略・総合・IT系コンサルティングファーム',
        questions: [
          { level: 'basic', category: '業界構造', question: 'コンサル業界の主な分類として最も一般的なのは?', options: ['戦略系・総合系・シンクタンク系・IT系の4区分', '国内/海外の地域分類', '上場/非上場の財務分類', '創業年数による新興/老舗の分類'], answer: 0, explanation: 'クライアント課題の範囲と提供価値で分けるのが一般的。MBB等の戦略系、アクセンチュア・Big4等の総合系、シンクタンク系(野村総研等)、IT系が代表区分。' },
          { level: 'basic', category: '業界基礎', question: '戦略コンサル「MBB」と呼ばれる3社は?', options: ['McKinsey, BCG, Bain', 'Mitsubishi, Mizuho, MUFG', 'McKinsey, Bain, Boston Scientific', 'Meta, Microsoft, Mandiant'], answer: 0, explanation: 'McKinsey & Company / Boston Consulting Group / Bain & Companyの頭文字。経営トップ層の戦略課題を扱う少数精鋭ファームの代表格。' },
          { level: 'basic', category: '業界基礎', question: '次の「総合コンサルティングファーム」の中で、会計事務所・監査法人を母体としていない(いわゆるBig4ではない)企業はどれ?', options: ['アクセンチュア', 'PwCコンサルティング', 'KPMGコンサルティング', 'デロイト トーマツ コンサルティング'], answer: 0, explanation: 'PwC/KPMG/デロイト(とEYを加えた4社)は「Big4」と呼ばれる世界的な会計・監査法人グループを母体とし、財務・M&A・ガバナンス領域に強い。一方アクセンチュアはシステム・IT領域から発展した歴史を持ち、テクノロジー実装やデジタル領域で圧倒的な規模を誇る。「総合コンサル」と一括りにしても強みの源泉が異なる。' },
          { level: 'basic', category: '業界内比較', question: '戦略系コンサル(MBB等)と総合系コンサル(アクセンチュア・Big4等)の最大の違いは?', options: ['戦略系は経営判断に絞った短期・小規模案件、総合系は実行支援(IT導入・業務改革)まで含む大規模・長期案件', '戦略系は新卒中心、総合系は中途中心という採用の違い', '戦略系は外資のみ、総合系は日系のみ', '戦略系は単年契約、総合系は3年以上の長期契約が必須'], answer: 0, explanation: 'カバー範囲(戦略立案だけ vs 実行まで)、案件規模(数億 vs 数十〜数百億)、関与人数(数名 vs 数十名)が最大の違い。' },
          { level: 'basic', category: '業界内比較', question: 'シンクタンクと戦略コンサルティングの違いとして、間違っているものはどれ?', options: ['シンクタンクのプロジェクト期間は短期集中(数週間〜数ヶ月)、戦略コンサルは中長期(数ヶ月〜数年単位)', 'シンクタンクの主目的は社会・業界課題の深掘りやマクロな予測・提言、戦略コンサルはクライアント企業の利益最大化や経営課題の直接的解決', 'シンクタンクの主要クライアントは官公庁・自治体・業界団体が中心、戦略コンサルはグローバル大企業の経営陣(C-suite)が中心', 'シンクタンクのアウトプットは詳細な調査レポート・白書・政策提言、戦略コンサルは実行可能な戦略スライドや意思決定フレームワーク'], answer: 0, explanation: 'プロジェクト期間は逆。シンクタンク=中長期(数ヶ月〜数年)、戦略コンサル=短期集中(数週間〜数ヶ月)が一般的。代表企業はシンクタンク系がNRI(野村総研)・MRI(三菱総研)、戦略コンサルがMcKinsey/BCG/Bain。' },
          { level: 'basic', category: 'ビジネスモデル', question: 'コンサルファームのビジネスモデルが「人月商売」と呼ばれる理由は?', options: ['コンサルタント1人を一定期間派遣し、フィーが「人数×期間」で計算されるため', '毎月給料が変動する仕組みのため', '月単位で社員を別ファームに移籍させるため', '在庫を月次で評価する仕組みがあるため'], answer: 0, explanation: 'コンサルは「人材」自体がコアプロダクト。クライアントにコンサルタントを派遣し、人数×期間でフィーを得る労働集約型ビジネス。' },
          { level: 'basic', category: '選社軸', question: '「なぜコンサルか」を語る際、最も筋が悪い答えは?', options: ['多様な業界・経営課題に若いうちから触れたい', '事業を客観的に分析する思考法を身につけたい', '高年収で成長企業のイメージがあるから', '将来経営に関わる仕事をしたいので、最短で経営目線の経験を積みたい'], answer: 2, explanation: '年収・成長イメージは結果論で業務本質と接続しない。「経営課題への関わり方」「思考法の獲得」など本業との具体接続が必須。' },
          { level: 'intermediate', category: '各社比較', question: 'アクセンチュアの強みとして最も語られやすいのは?', options: ['IT領域での開発力・導入スピードと世界最大規模(75万人超・49カ国)', '会計監査の長い歴史と監査品質', 'PEファンド支援に特化した独自モデル', '官公庁向け政策研究に特化した小規模ファーム'], answer: 0, explanation: 'Strategy & Consulting / Technology / Operations / Industry X / Songの5領域を保有。SAP導入実績・規模感が圧倒的で、ITに強い世界最大の総合ファーム。' },
          { level: 'intermediate', category: '各社比較', question: 'デロイト(Deloitte)の特徴として正しいのは?', options: ['BIG4の中で日系色が強く、新卒研修約3ヶ月、セキュリティ分野で世界一のシェア', 'アメリカ本社の純外資企業で日本拠点は出張ベース', '事業領域はシンクタンク機能のみ', 'IT領域は完全に他社に外注している'], answer: 0, explanation: '「100年先に続くバリューを、日本から」を掲げる日系色の強いグローバルメンバーファーム。3ヶ月の手厚い新卒研修、セキュリティ12年連続1位等が特徴。' },
          { level: 'intermediate', category: '各社比較', question: 'PwCコンサルティングの特徴として代表的なのは?', options: ['部門横断型プロジェクトが多く、グループ企業との連携が強み(戦略部隊は別法人Strategy&)', '部門間連携を一切行わず各部門が独立採算で動く', '日本国内のみで事業展開', '監査業務は一切扱わない'], answer: 0, explanation: '151カ国36万人のネットワークを活かし部門横断型に強い。戦略部隊はStrategy&として分離している点もデロイトとの違い。' },
          { level: 'intermediate', category: '各社比較', question: 'EYストラテジー・アンド・コンサルティングの特徴は?', options: ['「Project Dragon」等で急成長中、若手裁量が大きく、デジタルテクノロジー領域に注力', '創業100年の老舗で保守的な社風', '採用人数が極めて少なく中途中心', '官公庁案件に完全特化'], answer: 0, explanation: '2019年に売上744億円・コンサル3,224人体制を目指す「Project Dragon」を打ち出し急成長。社員数が少なかった背景で若手にも大きな裁量が回ってくる。' },
          { level: 'intermediate', category: '各社比較', question: 'KPMGコンサルティングの特徴として正しいのは?', options: ['2014年設立の比較的新しいファームで少数精鋭(約2,370人)、社員提案型の働き方改革「LEAP」が特徴', '日本最古のコンサルファームで全社員1万人超', 'IT専業ファームでシステム導入のみ扱う', '官公庁案件のみ受託'], answer: 0, explanation: '2014年誕生の新生ファーム。Deloitte約11,000人/PwC約13,500人に対しKPMGは約2,370人と少数精鋭。「KPMGらしさ」を作る側に回りたい人向け。' },
          { level: 'intermediate', category: '各社比較', question: 'アビーム(ABeam)コンサルティングの特徴は?', options: ['日系総合ファームで「Real Partner®」を掲げ、年間約750名が海外渡航するSAP/IT領域に強い', '純外資で英語のみで業務が完結する', 'ファームとして独立せず親会社の1部門', 'プロジェクト期間が必ず1ヶ月以内に限定される'], answer: 0, explanation: 'アジア中心28拠点・約9,000名の日系ファーム。日系企業の海外進出支援が強み、SAPコンサル資格保有数が国内最多級。' },
          { level: 'intermediate', category: '各社比較', question: '日本を代表するシンクタンクである「野村総合研究所(NRI)」について、現在の売上高の大部分(約9割)を占めている事業領域はどれ?', options: ['金融機関や産業界向けのITシステム開発・運用', '官公庁向けのリサーチ・政策提言', '企業のM&A(合併・買収)アドバイザリー', '経営戦略コンサルティング'], answer: 0, explanation: 'NRIは「シンクタンク」の名前を冠し、リサーチや戦略コンサル機能も持つが、ビジネスの主軸は巨大なITシステムインテグレーター(SIer)。証券会社やCVS等の基幹システムを支え、採用も「ITエンジニア・ITコンサル」が圧倒的に多い。社名イメージと実態を分けて企業研究することが重要。' },
          { level: 'intermediate', category: '業界内比較', question: '総合コンサルファームは独立系の戦略コンサルを買収し社内ブランドとして統合してきた。次のうち「組み合わせ」が間違っているのはどれ?', options: ['アクセンチュア × ベイン・アンド・カンパニー = 「アクセンチュア・戦略グループ」', 'デロイト × モニターグループ = 「モニター デロイト」', 'PwC × ブーズ・アンド・カンパニー = 「Strategy&(ストラテジーアンド)」', 'EY × パルテノン・グループ = 「EYパルテノン」'], answer: 0, explanation: 'ベインはMBB一角の独立戦略ファームで、どこかの子会社にはなっていない(アクセンチュアの戦略部門は自社立ち上げ)。近年、総合ファームは戦略ファームを買収し社内に純粋戦略部隊を抱える流れ。選考でも「総合ファームの中の戦略コース」か「総合コンサルコース」かで面接難度・対策(ケース面接の有無等)が大きく変わる。' },
          { level: 'advanced', category: '業界動向', question: 'コンサル各社が「アドバイス」から「実行支援」へと役割を広げている主な理由は?', options: ['経営環境が複雑化しDX/IT活用が必須となり、企業が自社だけで戦略実行するのが難しくなったため', '戦略立案の単価が下がりすぎたため逃避的に実行支援に進出', '監査業務の代替として実行支援を必要とするため', 'AIで戦略立案が完全自動化されたため'], answer: 0, explanation: 'DX需要の高まりで戦略実行の難度が上昇。総合コンサルへの「実行まで一緒にやってほしい」という日常依頼が増え、業界全体の売上拡大要因に。' },
          { level: 'advanced', category: '業界動向', question: '2024年以降コンサル各社が「生成AI」を成長エンジンに位置づけている理由として正しいのは?', options: ['クライアントへの導入支援案件の急増と、自社のコンサルタント業務(資料作成・分析等)の効率化を両立する戦略のため', 'コンサル業務がAIに完全代替されるため事業転換が必要だから', '会計監査の法令で生成AI導入が義務化されたため', '広告効果がAIテーマで突出して高いため'], answer: 0, explanation: 'クライアント支援とインハウス効率化の両輪。一部グローバルファームではAI効率化を背景にバックオフィス再編も進む。' },
          { level: 'advanced', category: 'ビジネスモデル', question: 'コンサルファームのP&L構造を支える本質的な指標は?', options: ['コンサルタント1人あたりの稼働率×単価(Utilization × Billing Rate)', '本社オフィスの広さ', '資本金の額', '年間広告費の額'], answer: 0, explanation: '人=売上の労働集約モデルなので、稼働率と単価が利益構造の中核。これがUp or Outや高単価採用の構造的理由。' },
          { level: 'advanced', category: '社風・文化', question: 'アクセンチュアで広く浸透するスタンス「Think straight, talk straight」が示すのは?', options: ['率直に考え率直に話す。多様な背景を持つ社員がフラットにコミュニケーションする文化', '直線的な階層に基づく上意下達の文化', '社外への発信を必ず本社経由で行う広報方針', '英語のみで業務を行うグローバル方針'], answer: 0, explanation: '率直なコミュニケーションを推奨する代表バリュー。実際の現場では伝え方や人間関係の配慮も両立する文化として機能している。' },
          { level: 'advanced', category: '選社軸', question: '「なぜ他のコンサルではなく弊社か」への回答として最も本質的な切り口は?', options: ['対象業界の強み・案件規模・カルチャー・Postキャリアの方向性が、自身の志向とどう重なるかの具体接続', '初任給や福利厚生の差', '社員食堂のメニューや勤務地のオフィス設備', '採用倍率や入社難易度の比較'], answer: 0, explanation: '各ファームには得意領域・案件性質・カルチャー・退職後キャリアの「色」がある。自身の志向と重なる「なぜそこでないとダメか」を具体で語る必要がある。' },
          { level: 'advanced', category: '選考対策', question: '【ケース面接】「都内の中堅ホテルの売上を3年で2倍にする施策を考えてください」と問われた際、最初のアプローチとして最も評価される発言は?', options: ['まず現状の売上構成(宿泊・飲食・宴会等)と顧客層を因数分解し、どこに最大のボトルネックや伸びしろがあるか特定するための質問をさせてください', 'すぐに実行できる施策として、インバウンド向けのSNSマーケティング強化を提案します', '売上を「客数×客単価」に分解し、それぞれの数値を上げるためのアイデアをブレインストーミングしましょう', '競合となる外資系高級ホテルの戦略をリストアップし、ベンチマークとして比較分析を始めます'], answer: 0, explanation: '戦略コンサルでは「打ち手(アイデア)への飛びつき」は厳禁。単に数式に分解するだけでなく、事実(ファクト)に基づいてイシュー(解くべき真の課題)を特定する構造化の初動が最も評価される。' },
        ]
      },
      ib: {
        name: '外資投資銀行', nameEn: 'INVESTMENT BANKING', description: 'Goldman Sachs, Morgan Stanley等',
        questions: [
          { level: 'basic', category: '業界構造', question: '外資投資銀行(IB)の主要な部門区分として正しいのは?', options: ['フロントオフィス(IBD/S&T/Research)・ミドル・バックの3層構造', '営業部と総務部の2部門のみ', '研究開発部と販売部の2部門', '広告部と人事部の2部門'], answer: 0, explanation: 'フロントは収益直結部門(IBD/S&T/Research)、ミドルはリスク管理、バックはオペレーション。新卒応募はフロント中心。' },
          { level: 'basic', category: '業界基礎', question: '「Bulge Bracket」と呼ばれるグローバル大手IB群の代表は?', options: ['Goldman Sachs / Morgan Stanley / JP Morgan等', 'Deloitte / PwC / EY / KPMG', 'McKinsey / BCG / Bain', 'Sony / Toyota / Honda'], answer: 0, explanation: 'GS/MS/JPMを筆頭にBofA、Citi等のグローバル超大手。世界最上位ティアの投資銀行群を指す。' },
          { level: 'basic', category: '業界基礎', question: '「IBD」と「S&T」の違いは?', options: ['IBDはM&A・資金調達アドバイザリー、S&Tは市場での売買仲介', '両者とも全く同じ業務', 'IBDは個人向け、S&Tは法人向けの違い', 'IBDは日系のみ、S&Tは外資のみ'], answer: 0, explanation: 'IBD(Investment Banking Division)は企業のディール助言。S&T(Sales & Trading)は機関投資家向けに株/債/為替を売買する市場部門。' },

        const targetAnswer = answerPositionPattern[(industryIndex + questionIndex) % answerPositionPattern.length] % question.options.length;
        if (question.answer === targetAnswer) return;

        const correctOption = question.options[question.answer];
        const distractors = question.options.filter((_, optionIndex) => optionIndex !== question.answer);

        question.options = distractors;

                      return (
                        <button
                          key={lv.key}
                          onClick={() => { if (!isLocked) setLevel(lv.key); }}
                          disabled={isLocked}
                          aria-disabled={isLocked}
                          className={`text-center p-3 md:p-4 border-2 border-dark transition-all duration-150 ${isLocked ? 'bg-muted cursor-not-allowed opacity-60' : (isActive ? 'bg-dark text-surface shadow-brutal-accent' : 'bg-surface text-dark hover:-translate-y-[2px] hover:shadow-brutal-dark active:translate-y-0 active:shadow-none')}`}
                        >
                          <div className={`text-[10px] tracking-widest mb-1 ${isActive && !isLocked ? 'text-muted' : 'text-sub'}`}>LV.{i + 1}</div>
                          <div className="font-serif font-bold text-base md:text-lg" style={{ color: isLocked ? '#58544E' : (isActive ? '#FBF7EE' : '#1C1C1E') }}>{lv.label}</div>
                          {isLocked ? (
                            <div className="text-[10px] mt-1 font-bold tracking-wide" style={{ color: '#C73E3A' }}>🔒 参加者限定</div>
                          ) : (
                            <div className="text-[11px] mt-1 leading-snug font-medium" style={{ color: isActive ? '#EDE4D2' : '#1C1C1E' }}>{lv.description}</div>
                          )}
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* STEP 03 */}
                <div className="mb-8">
                  <div className="flex items-baseline gap-2 mb-3 flex-wrap">
                    <span className="text-[10px] tracking-[0.3em] text-sub">STEP 03</span>
                    <span className="text-sm font-bold text-dark">問題数を選ぶ</span>
                    <span className="text-[10px] ml-auto text-sub">最大{availablePool.length}問</span>
                  </div>
                  <div className="grid grid-cols-3 gap-3">
                    {countOptions.map(n => {
                      const isActive = count === n;
                      const isLocked = LITE_MODE && n !== LITE_ALLOWED_COUNT;
                      return (
                        <button
                          key={n}
                          onClick={() => { if (!isLocked) setCount(n); }}
                          disabled={isLocked}
                          aria-disabled={isLocked}
                          className={`text-center p-3 md:p-4 border-2 border-dark transition-all duration-150 ${isLocked ? 'bg-muted cursor-not-allowed opacity-60' : (isActive ? 'bg-dark text-surface shadow-brutal-accent' : 'bg-surface text-dark hover:-translate-y-[2px] hover:shadow-brutal-dark active:translate-y-0 active:shadow-none')}`}
                        >
                          <div className="font-display text-[1.5rem] font-black" style={{ color: isLocked ? '#58544E' : (isActive ? '#FBF7EE' : '#1C1C1E') }}>
                            {n}<span className="text-xs ml-1 font-normal">問</span>
                          </div>
                          {isLocked && (
                            <div className="text-[10px] mt-1 font-bold tracking-wide" style={{ color: '#C73E3A' }}>🔒 参加者限定</div>
                          )}
                        </button>
                      );
                    })}
                  </div>
                </div>

                <button
                  onClick={startQuiz}
                  className="w-full py-5 text-lg font-bold tracking-wider border-2 border-dark bg-dark text-surface shadow-brutal-accent transition-all duration-150 hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-brutal-accent-sm active:translate-x-[4px] active:translate-y-[4px] active:shadow-none"
                >
                  START →
                </button>
              </div>

              <div className="text-center mt-5 text-[10px] tracking-widest text-sub">
                ISSUED APRIL 2026 · SUMMER SELECTION STUDY DECK
              </div>
            </div>
          </div>
        );
      }

      // ============================================================
      // QUIZ SCREEN
      // ============================================================
      if (screen === 'quiz') {
        const q = questions[currentQ];
        const progress = ((currentQ + (selected !== null ? 1 : 0)) / questions.length) * 100;
        const isCorrect = selected === q.answer;
        const currentIndustry = quizBank[industry];
        const currentLevel = levelList.find(l => l.key === level);

        return (
          <div className="flex items-center justify-center p-4 md:p-8 min-h-screen">
            <div className="w-full max-w-3xl">
              <div className="mb-6">
                <div className="flex items-center justify-between flex-wrap gap-2 mb-3">
                  <div className="flex items-baseline gap-3">
                    <span className="text-[10px] tracking-[0.3em] text-sub">QUESTION</span>
                    <span className="font-display text-[1.5rem] font-black text-dark">{String(currentQ + 1).padStart(2, '0')}</span>
                    <span className="text-sm text-sub">/ {questions.length}</span>
                  </div>
                  <div className="flex gap-2 flex-wrap">
                    <span className="text-[10px] tracking-widest px-2 py-1 border border-dark text-dark bg-surface">{currentIndustry.name}</span>
                    <span className="text-[10px] tracking-widest px-2 py-1 bg-dark text-surface">{currentLevel.label}</span>
                    <span className="text-[10px] tracking-widest px-2 py-1 border border-dark text-dark bg-surface">{q.category}</span>
                  </div>
                </div>
                <div className="h-1.5 w-full border border-dark bg-surface">
                  <div className="h-full transition-all duration-500 bg-accent" style={{ width: `${progress}%` }} />
                </div>
              </div>

              <div className={`border-2 border-dark bg-surface shadow-brutal-dark-lg p-6 md:p-10 mb-5 transition-all duration-500 ${fadeIn ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`}>
                <h2 className="font-serif leading-snug mb-8 text-[clamp(1.2rem,3vw,1.7rem)] font-bold text-dark">
                  {q.question}
                </h2>

                <div className="space-y-4">
                  {q.options.map((opt, idx) => {
                    const isSelected = selected === idx;
                    const isRight = idx === q.answer;
                    const showResult = selected !== null;

                    let btnClass = "w-full text-left p-4 md:p-5 border-2 flex items-center gap-4 transition-all duration-200 ";
                    let badgeClass = "shrink-0 w-9 h-9 flex items-center justify-center font-bold text-sm border-2 border-dark ";

                    if (showResult) {
                      if (isRight) {
                        btnClass += "bg-correctbg border-success text-dark";
                        badgeClass += "bg-success text-surface border-success";
                      } else if (isSelected) {
                        btnClass += "bg-error border-accent text-dark";
                        badgeClass += "bg-accent text-surface border-accent";
                      } else {
                        btnClass += "bg-surface border-dark text-dark opacity-70";
                        badgeClass += "bg-surface text-dark";
                      }
                    } else {
                      btnClass += "bg-surface border-dark text-dark hover:-translate-y-[2px] hover:shadow-brutal-dark cursor-pointer active:translate-y-0 active:shadow-none";
                      badgeClass += "bg-surface text-dark";
                    }

                    return (
                      <button key={idx} onClick={() => chooseAnswer(idx)} disabled={showResult} className={btnClass}>
                        <span className={badgeClass}>{String.fromCharCode(65 + idx)}</span>
                        <span className="flex-1 text-sm md:text-base font-semibold" style={{ color: '#1C1C1E' }}>{opt}</span>
                        {showResult && isRight && <span className="shrink-0 text-xl font-bold text-success">○</span>}
                        {showResult && isSelected && !isRight && <span className="shrink-0 text-xl font-bold text-accent">×</span>}
                      </button>
                    );
                  })}
                </div>
              </div>

              {selected !== null && (
                <div className={`border-2 p-5 md:p-7 mb-5 animate-slide-up ${isCorrect ? 'bg-correctbg border-success shadow-brutal-success' : 'bg-surface border-accent shadow-brutal-error'}`}>
                  <div className="flex items-center gap-3 mb-3">
                    <span className={`px-3 py-1 text-[10px] tracking-widest font-bold text-surface ${isCorrect ? 'bg-success' : 'bg-accent'}`}>
                      {isCorrect ? 'CORRECT' : 'INCORRECT'}
                    </span>
                    <span className="text-[10px] tracking-widest text-sub">EXPLANATION</span>
                  </div>
                  <p className="text-sm md:text-base leading-relaxed" style={{ color: '#1C1C1E' }}>{q.explanation}</p>
                </div>
              )}

              {selected !== null && (
                <button
                  onClick={nextQuestion}
                  className="w-full py-5 text-base font-bold tracking-wider border-2 border-dark bg-dark text-surface shadow-brutal-accent transition-all duration-150 hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-brutal-accent-sm active:translate-x-[4px] active:translate-y-[4px] active:shadow-none animate-slide-up"
                >
                  {currentQ < questions.length - 1 ? '次の問題へ →' : '結果を見る →'}
                </button>
              )}
            </div>
          </div>
        );
      }

      // ============================================================
      // FINAL / REVIEW SCREEN (結果と解説)
      // ============================================================
      if (screen === 'final') {
        const msg = scorePercent >= 90 ? { title: '完璧です', sub: 'エントリー準備に進んでOK', color: 'text-success', bar: 'bg-success' }
                  : scorePercent >= 70 ? { title: '十分な基礎力', sub: '細部を詰めつつ実戦へ', color: 'text-warning', bar: 'bg-warning' }
                  : { title: 'ここから', sub: '今すぐ業界研究スタート', color: 'text-accent', bar: 'bg-accent' };
        
        return (
          <div className="flex items-center justify-center p-4 md:p-8 min-h-screen">
            <div className="w-full max-w-3xl">
              <div className={`border-2 border-dark bg-surface shadow-brutal-dark-lg p-6 md:p-12 transition-all duration-700 ${fadeIn ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`}>
                <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
                  <div className="text-xs tracking-[0.3em] text-sub">RESULT</div>
                  <div className="text-[10px] tracking-widest text-sub">{quizBank[industry].nameEn}</div>
                </div>

                <h2 className="font-serif mb-8 text-[clamp(1.8rem,5vw,3.2rem)] font-extrabold text-dark leading-tight">
                  {msg.title}<span className={msg.color}>.</span>
                </h2>

                <div className="flex items-end gap-6 mb-8 pb-8 border-b-2 border-dark">
                  <div>
                    <div className="text-[10px] tracking-widest mb-1 text-sub">SCORE</div>
                    <div className="font-display text-[clamp(3.5rem,11vw,6rem)] font-black text-dark leading-none">
                      {correctCount}<span className="text-sub text-[0.4em] ml-2">/ {questions.length}</span>
                    </div>
                  </div>
                  <div className="flex-1 pb-3">
                    <div className="text-[10px] tracking-widest mb-1 text-sub">ACCURACY</div>
                    <div className={`font-display text-[clamp(1.4rem,4vw,2.25rem)] font-bold ${msg.color}`}>
                      {scorePercent}<span className="text-base">%</span>
                    </div>
                    <div className="mt-2 h-1.5 w-full bg-muted border border-dark">
                      <div className={`h-full transition-all duration-1000 ${msg.bar}`} style={{ width: `${scorePercent}%` }} />
                    </div>
                  </div>
                </div>

                <p className="text-sm md:text-base mb-8 leading-relaxed text-dark font-medium">{msg.sub}</p>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">
                  <button onClick={restart} className="py-4 text-sm font-bold tracking-wider border-2 border-dark bg-dark text-surface shadow-brutal-accent transition-all duration-150 hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-brutal-accent-sm active:translate-x-[4px] active:translate-y-[4px] active:shadow-none">
                    別の条件で挑戦 →
                  </button>
                  <button onClick={() => setScreen('review')} className="py-4 text-sm font-bold tracking-wider border-2 border-dark bg-surface text-dark shadow-brutal-dark transition-all duration-150 hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_#1C1C1E] active:translate-x-[4px] active:translate-y-[4px] active:shadow-none">
                    全問解説を見る
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (screen === 'review') {
        return (
          <div className="p-4 md:p-8 min-h-screen">
            <div className="w-full max-w-3xl mx-auto">
              <div className="flex items-center gap-3 mb-8">
                <div className="h-px flex-1 bg-dark" />
                <span className="tracking-[0.3em] text-xs font-bold text-dark">ALL EXPLANATIONS</span>
                <div className="h-px flex-1 bg-dark" />
              </div>
              <div className="space-y-6">
                {questions.map((q, i) => {
                  const wasCorrect = answers[i]?.correct;
                  return (
                    <div key={i} className="border-2 border-dark bg-surface shadow-brutal-dark p-5 md:p-6">
                      <div className="flex items-start gap-4 mb-4">
                        <span className={`shrink-0 w-10 h-10 flex items-center justify-center font-bold border-2 border-dark ${wasCorrect ? 'bg-success text-surface' : 'bg-accent text-surface'}`}>
                          {wasCorrect ? '○' : '×'}
                        </span>
                        <div className="flex-1 pt-1">
                          <div className="text-[10px] tracking-widest mb-1 text-sub">Q.{String(i + 1).padStart(2, '0')} / {q.category}</div>
                          <div className="font-bold text-base leading-snug" style={{ color: '#1C1C1E' }}>{q.question}</div>
                        </div>
                      </div>
                      <div className="bg-muted border border-dark p-3 md:p-4 mb-3">
                        <span className="text-[10px] font-bold tracking-widest block mb-1 text-sub">正解</span>
                        <div className="font-bold text-sm md:text-base" style={{ color: '#1C1C1E' }}>{q.options[q.answer]}</div>
                      </div>
                      <p className="text-sm leading-relaxed font-medium" style={{ color: '#1C1C1E' }}>{q.explanation}</p>
                    </div>
                  );
                })}
              </div>
              <button onClick={restart} className="w-full mt-8 py-5 text-sm font-bold tracking-wider border-2 border-dark bg-dark text-surface shadow-brutal-accent transition-all duration-150 hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-brutal-accent-sm active:translate-x-[4px] active:translate-y-[4px] active:shadow-none">
                最初に戻る →
              </button>
            </div>
          </div>
        );
      }
      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SummerSelectionQuiz />);
  </script>
</body>
</html>
