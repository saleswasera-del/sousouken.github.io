function calcPhase1(answers) {
  const s = { what: 0, become: 0, how: 0, get: 0 };
  answers.forEach((v, i) => { s[v] += W[i]; });
  let best = null, bestS = -1;
  Object.keys(s).forEach(k => { if (s[k] > bestS) { bestS = s[k]; best = k; } });
  return best;
}

function calcPhase2(answers, p1) {
  const subKeys = {
    what:   ["industry", "role", "customer", "style"],
    become: ["speed", "skill", "career", "learning"],
    how:    ["culture", "people", "freedom", "place"],
    get:    ["money", "stable", "brand", "mission"]
  }[p1];
  const s = {};
  subKeys.forEach(k => { s[k] = 0; });
  answers.forEach((v, i) => { s[v] += W[i]; });
  let best = null, bestS = -1;
  Object.keys(s).forEach(k => { if (s[k] > bestS) { bestS = s[k]; best = k; } });
  return best;
}

/* ============================================================
   描画レイヤー（React/JSXを使わないバニラJS版）
   - 状態が変わるたび render() で #root を組み直すだけのシンプル構成
   - 外部ライブラリ・ビルド工程・CDN一切なしで単一HTMLとして完結
   ============================================================ */

/* 軽量DOMヘルパー: el(タグ, 属性, ...子) で要素を作る */
function el(tag, props) {
  var e = document.createElement(tag);
  if (props) {
    for (var k in props) {
      var v = props[k];
      if (v == null) continue;
      if (k === "class") e.className = v;
      else if (k === "html") e.innerHTML = v;
      else if (k === "style" && typeof v === "object") { for (var s in v) e.style[s] = v[s]; }
      else if (k.slice(0, 2) === "on" && typeof v === "function") e.addEventListener(k.slice(2).toLowerCase(), v);
      else e.setAttribute(k, v);
    }
  }
  for (var i = 2; i < arguments.length; i++) addChild(e, arguments[i]);
  return e;
}
function addChild(parent, c) {
  if (c == null || c === false) return;
  if (Array.isArray(c)) { c.forEach(function (x) { addChild(parent, x); }); return; }
  parent.appendChild(c.nodeType ? c : document.createTextNode(String(c)));
}
function pad2(n) { return String(n).padStart(2, "0"); }

/* 結果ヒーロー画像: 城背景つき通常版(横長)を角丸長方形枠にジャストサイズで大きく表示 */
function HeroImage(type, w, h) {
  var box = el("div", { class: "cc-hero-img", style: { width: w + "px", height: h + "px" } });
  var img = el("img", {
    src: "./images/shukatsu_diagnosis/web/hero_" + type.file + ".jpg",

  });
  img.onerror = function () {
    img.replaceWith(el("span", { style: { fontSize: Math.round(h * 0.5) + "px", lineHeight: 1 } }, type.emoji));
  };
  box.appendChild(img);
  return box;
}

/* 動物画像（サムネ）: activeで反転表示。cropped=trueでクロップ版を使う */
function AnimalThumb(type, size, active, cropped) {
  var bg = active ? "#8B2E2A" : "#FBF8F1";
  var border = active ? "#8B2E2A" : "rgba(42, 36, 33, 0.18)";
  var wrap = el("div", { class: "cc-animal-thumb", style: { width: size + "px", height: size + "px", background: bg, border: "1px solid " + border } });
  var src = "./images/shukatsu_diagnosis/web/cropped_" + type.file + ".png";
  var img = el("img", {
    src: src,
    alt: type.name,
    style: { width: "80%", height: "80%", objectFit: "contain", filter: active ? "brightness(0) invert(1)" : "none" }
  });
  img.onerror = function () {
    img.replaceWith(el("span", { style: { fontSize: (size * 0.55) + "px", lineHeight: 1, filter: active ? "grayscale(1) brightness(2)" : "none" } }, type.emoji));
  };
  wrap.appendChild(img);
  return wrap;
}

var stage = "start", p1Answers = [], p2Answers = [], p1Winner = null;

function start() { stage = "phase1"; p1Answers = []; p2Answers = []; p1Winner = null; render(); }
function restart() { stage = "start"; p1Answers = []; p2Answers = []; p1Winner = null; render(); }
function pick(value) {
  if (stage === "phase1") {
    p1Answers = p1Answers.concat([value]);
    if (p1Answers.length >= 5) { p1Winner = calcPhase1(p1Answers); render(); setTimeout(function () { stage = "phase2"; render(); }, 220); }
    else render();
  } else if (stage === "phase2") {
    p2Answers = p2Answers.concat([value]);
    if (p2Answers.length >= 5) { render(); setTimeout(function () { stage = "result"; render(); }, 220); }
    else render();
  }
}
function back() {
  if (stage === "phase1") {
    if (p1Answers.length === 0) return;
    p1Answers = p1Answers.slice(0, -1); render();
  } else if (stage === "phase2") {
    if (p2Answers.length === 0) { stage = "phase1"; p1Winner = null; p1Answers = p1Answers.slice(0, -1); render(); }
    else { p2Answers = p2Answers.slice(0, -1); render(); }
  }
}

  sec.appendChild(el("div", { class: "cc-hair cc-mb-10" }));

  var catGrid = el("div", { class: "cc-cat-grid" });
  Object.keys(PHASE1_CATS).forEach(function (k, i) {
    catGrid.appendChild(el("div", { class: "cc-cat-item" },
      el("div", { class: "cc-cat-no num" }, pad2(i + 1)),
      el("div", { class: "cc-cat-jp serif-jp" }, PHASE1_CATS[k].label),
      el("div", { class: "cc-cat-en serif-en" }, PHASE1_CATS[k].en)
    ));
  });
  sec.appendChild(catGrid);
  sec.appendChild(el("div", { class: "cc-hair cc-mb-10" }));

  var peek = el("div", { class: "cc-mb-10" }, el("div", { class: "cc-peek-label" }, "16 Animals · ひとつだけ、あなたの動物"));
  var peekGrid = el("div", { class: "cc-peek-grid" });
  Object.keys(TYPES).forEach(function (k) { peekGrid.appendChild(AnimalThumb(TYPES[k], 38, false, true)); });
  peek.appendChild(peekGrid);
  sec.appendChild(peek);

  sec.appendChild(el("div", { class: "cc-final-note-row" },
    el("div", { class: "cc-begin-note" }, "所要時間：約 3 分"),
    el("button", { class: "cc-btn-primary", onClick: start }, "Begin →")
  ));
  return sec;
}

function buildQuiz() {
  var currentQ = null;
  if (stage === "phase1") currentQ = PHASE1_QUESTIONS[p1Answers.length];
  if (stage === "phase2" && p1Winner) currentQ = PHASE2_QUESTIONS[p1Winner][p2Answers.length];
  if (!currentQ) return null;

  var totalAnswered = p1Answers.length + p2Answers.length;
  var totalQuestions = 10;
  var sec = el("section", { class: "anim-fade-up-q" });

  var dots = el("div", { class: "cc-progress-dots" });
  for (var i = 0; i < totalQuestions; i++) {
    var bg = i < totalAnswered ? "#8B2E2A" : (i === totalAnswered ? "#2A2421" : "rgba(42, 36, 33, 0.12)");
    dots.appendChild(el("div", { class: "cc-progress-dot", style: { background: bg } }));
  }
  sec.appendChild(el("div", { class: "cc-q-progress-row" },
    el("div", { class: "cc-q-counter num" }, "Q. " + pad2(totalAnswered + 1) + " / " + totalQuestions),
    dots
  ));

  sec.appendChild(el("div", { class: "cc-q-phase num" },
    stage === "phase1" ? "PHASE 1 / 大カテゴリ" : "PHASE 2 / " + PHASE1_CATS[p1Winner].label + "の中で"));

  sec.appendChild(el("h2", { class: "cc-q-prompt serif-jp" }, currentQ.prompt));
  if (currentQ.note) sec.appendChild(el("div", { class: "cc-q-note" }, "★ " + currentQ.note));
  else sec.appendChild(el("div", { class: "cc-q-spacer" }));

  var opts = el("div", { class: "cc-options" });
  currentQ.options.forEach(function (opt, i) {
    opts.appendChild(el("button", { class: "cc-option", onClick: function () { pick(opt.value); } },
      el("span", { class: "cc-option-letter num" }, String.fromCharCode(65 + i) + "."),
      el("span", { class: "cc-option-label" }, opt.label),
      el("span", { class: "cc-option-arrow" }, "→")
    ));
  });
  sec.appendChild(opts);

  if (totalAnswered > 0) sec.appendChild(el("button", { class: "cc-back", onClick: back }, "← Back"));
  return sec;
}

function buildResult() {
  var p2Winner = calcPhase2(p2Answers, p1Winner);
  var finalType = TYPES[p1Winner + "-" + p2Winner];
  if (!finalType) return null;
  var sec = el("section", { class: "anim-fade-up" });

  sec.appendChild(el("div", { class: "cc-result-top anim-fade-in d-1" },
    el("div", { class: "cc-result-tag num" }, "— RESULT"),
    el("div", { class: "cc-result-type-no num" }, "TYPE " + pad2(finalType.no) + " / 16")
  ));

  var heroW = Math.min(600, Math.round((window.innerWidth || 375) * 0.92));
  var heroH = Math.round(heroW * 1536 / 2816);
  sec.appendChild(el("div", { class: "cc-hero anim-scale-in d-2" },
    HeroImage(finalType, heroW, heroH),
    el("div", { class: "cc-hero-en serif-en" }, finalType.en),
    el("h1", { class: "cc-hero-name serif-jp" }, finalType.name),
    el("div", { class: "cc-hero-catch serif-jp" }, "―― " + finalType.catch + " ――")
  ));

  sec.appendChild(el("div", { class: "cc-hair cc-mb-8" }));

  sec.appendChild(el("div", { class: "cc-breadcrumb anim-fade-in d-4" },
    el("div", { class: "cc-breadcrumb-item" },
      el("div", { class: "cc-breadcrumb-label num" }, "BIG CATEGORY"),
      el("div", { class: "cc-breadcrumb-jp serif-jp", style: { color: "#8B2E2A" } }, PHASE1_CATS[p1Winner].label),
      el("div", { class: "cc-breadcrumb-en serif-en" }, PHASE1_CATS[p1Winner].en)
    ),
    el("div", { class: "cc-breadcrumb-sep" }, "›"),
    el("div", { class: "cc-breadcrumb-item" },
      el("div", { class: "cc-breadcrumb-label num" }, "YOUR ANIMAL"),
      el("div", { class: "cc-breadcrumb-jp serif-jp" }, finalType.name),
      el("div", { class: "cc-breadcrumb-en serif-en" }, finalType.en)
    )
  ));

  sec.appendChild(el("div", { class: "cc-hair cc-mb-10" }));
  sec.appendChild(el("div", { class: "cc-detail-grid anim-fade-up-sm d-5" },
    el("div", { class: "cc-detail-label" }, "Who you are"),
    el("div", { class: "cc-detail-body" }, finalType.detail)
  ));
  sec.appendChild(el("div", { class: "cc-hair cc-mb-10" }));
  sec.appendChild(el("div", { class: "cc-detail-grid anim-fade-up-sm d-6" },
    el("div", { class: "cc-detail-label" }, "Good Fit · Industry"),
    el("div", { class: "cc-detail-body-jp serif-jp" }, finalType.fitIndustry)
  ));
  sec.appendChild(el("div", { class: "cc-hair cc-mb-10" }));
  sec.appendChild(el("div", { class: "cc-detail-grid anim-fade-up-sm d-7" },
    el("div", { class: "cc-detail-label" }, "Good Fit · Role"),
    el("div", { class: "cc-detail-body-jp serif-jp" }, finalType.fitRole)
  ));

  sec.appendChild(el("div", { class: "cc-rule cc-mb-10" }));

  var mapWrap = el("div", { class: "anim-fade-in d-8" },
    el("div", { class: "cc-map-label" }, "16 Animals Map"),
    el("p", { class: "cc-map-desc" }, "4つの大カテゴリ × 各4タイプ = 計16タイプ。あなたの位置にハイライトがついています。")
  );
  Object.keys(PHASE1_CATS).forEach(function (catKey, catIdx) {
    var types = Object.keys(TYPES).filter(function (k) { return k.indexOf(catKey + "-") === 0; }).map(function (k) { return TYPES[k]; });
    var group = el("div", { class: "cc-map-group" },
      el("div", { class: "cc-map-group-head" },
        el("div", { class: "cc-map-group-no num" }, pad2(catIdx + 1)),
        el("div", { class: "cc-map-group-jp serif-jp" }, PHASE1_CATS[catKey].label),
        el("div", { class: "cc-map-group-en serif-en" }, PHASE1_CATS[catKey].en)
      )
    );
    var grid = el("div", { class: "cc-type-grid" });
    types.forEach(function (t) {
      var isActive = t.no === finalType.no;
      grid.appendChild(el("div", { class: "cc-type-card" + (isActive ? " active" : "") },
        AnimalThumb(t, 36, isActive),
        el("div", { class: "cc-type-card-body" },
          el("div", { class: "cc-type-card-no num" }, pad2(t.no)),
          el("div", { class: "cc-type-card-name serif-jp" }, t.name),
          el("div", { class: "cc-type-card-catch" }, t.catch)
        )
      ));
    });
    group.appendChild(grid);
    mapWrap.appendChild(group);
  });
  sec.appendChild(mapWrap);

  sec.appendChild(el("div", { class: "cc-rule cc-mb-10" }));

  sec.appendChild(el("div", { class: "cc-final-note-row anim-fade-in d-9" },
    el("div", { class: "cc-final-note", html: "※ 診断結果は、あなたの軸を言語化する入り口です。<br />業界・職種はあくまで例として参考に。" }),
    el("button", { class: "cc-btn-primary", onClick: restart }, "Retake ↺")
  ));
  return sec;
}

/* ---- 描画 ---- */
function render() {
  var body = null;
  if (stage === "start") body = buildStart();
  else if (stage === "phase1" || stage === "phase2") body = buildQuiz();
  else if (stage === "result") body = buildResult();

  var container = el("div", { class: "cc-container" },
    buildHeader(),
    el("div", { class: "cc-rule cc-mb-10" }),
    body,
    buildFooter()
  );
  var app = el("div", { class: "cc-app" }, container);
  var root = document.getElementById("root");
  root.innerHTML = "";
  root.appendChild(app);
}

render();

</script>
</body>
</html>
