    const quizBank = {
      consulting: {
        name: 'コンサル', nameEn: 'CONSULTING', description: '戦略・総合・IT系コンサルティングファーム',
        questions: [
          { level: 'basic', category: 'タイミング', question: '28卒にとってサマーインターンに参加するベストな時期は?', options: ['2025年夏', '2026年夏(M1/B3の夏)', '2027年夏', '卒業直前'], answer: 1, explanation: '28卒(2028年3月卒業)のサマーは、卒業1.5〜2年前の2026年夏が本命。ここを逃すと早期選考ルートの多くを失う。' },
          { level: 'basic', category: '業界基礎', question: 'コンサル業界で「MBB」と呼ばれる3社は?', options: ['McKinsey, BCG, Bain', 'Mitsubishi, Mizuho, MUFG', 'McKinsey, Bain, Boston Scientific', 'Meta, Microsoft, Mandiant'], answer: 0, explanation: 'McKinsey & Company、Boston Consulting Group、Bain & Companyの頭文字。世界トップクラスの戦略コンサル3社。' },
          { level: 'basic', category: '業界基礎', question: '会計系コンサル「BIG4」に含まれないのは?', options: ['Deloitte', 'PwC', 'Accenture', 'KPMG'], answer: 2, explanation: 'BIG4はDeloitte / PwC / EY / KPMG。Accentureは総合系コンサル最大手だがBIG4ではない。' },
          { level: 'basic', category: '業界基礎', question: '戦略系コンサルと総合系コンサルの主な違いは?', options: ['扱う業界の違い', '課題の範囲と実行フェーズの有無', '会社の規模', '出身大学のレンジ'], answer: 1, explanation: '戦略系は経営層の意思決定支援に特化(短期・小規模)。総合系はIT・業務改革・実行支援まで広くカバー(長期・大規模)。' },
          { level: 'basic', category: 'タイミング', question: '28卒サマーインターンのエントリー ボリュームゾーンは?', options: ['2026年1〜3月', '2026年4〜6月', '2026年7〜8月', '2026年9〜11月'], answer: 1, explanation: '多くのファームが4〜6月にエントリー受付、6〜7月に選考、8〜9月にインターン実施。外資は4月締切もある。' },
          { level: 'basic', category: '戦略', question: 'サマーインターンに参加する最大のメリットは?', options: ['必ず内定がもらえる', '早期選考ルートに乗れる可能性が高い', 'アルバイト代が稼げる', '大学の単位が出る'], answer: 1, explanation: '多くのファームで優秀者に早期選考の案内が届く。本選考より倍率が有利になる「実質的な最短内定ルート」。' },
          { level: 'intermediate', category: '選考手法', question: '「ケース面接」で問われる本質的な能力は?', options: ['暗記力と知識量', '構造化・仮説構築・論理展開力', '英語プレゼンスキル', '業界の詳細知識'], answer: 1, explanation: '未知の課題に対し、論点を構造化し仮説を立て、定量・定性で検証する思考プロセスを見る。知識より思考の型が重要。' },
          { level: 'intermediate', category: '選考手法', question: 'フェルミ推定の基本アプローチで正しいのは?', options: ['正確な調査データを暗記する', '問題を分解し仮定を積み上げて概算する', '経験則で答える', '競合他社と比較する'], answer: 1, explanation: '「日本の電柱の数は?」等の問いを、人口・面積・密度等に分解し、仮定を重ねて概算する。分解の切り口と妥当性がカギ。' },
          { level: 'intermediate', category: '選考フロー', question: 'コンサル選考の典型的な順序は?', options: ['ES→Webテスト→GD→ケース面接→最終面接', '面接→ES→GD→Webテスト', 'GD→面接→ES→ケース', 'Webテスト→最終面接→ES'], answer: 0, explanation: '書類→適性検査→集団→個別選考の順が基本。ファームによりGDを省略したり、ケースが複数回あったりする。' },
          { level: 'intermediate', category: '選考手法', question: 'GD(グループディスカッション)で最も評価されにくいのは?', options: ['積極的な論点整理・構造化', '他メンバーの意見を活かす発言', '自分一人で結論を押し通す', '時間管理・ファシリテーション'], answer: 2, explanation: 'GDは「一人で勝つ場」ではなく「チームで結論に到達する場」。独断専行はクラッシャー扱いされ、通過率が著しく下がる。' },
          { level: 'intermediate', category: '戦略', question: 'ESの「Why Consulting」で評価される答えは?', options: ['年収が高いから', '自身の志向・経験と業務内容との論理的な接続が語れている', 'みんなが志望しているから', '成長できそうだから'], answer: 1, explanation: '「成長」「論理思考」等の抽象ワードだけでは不十分。自分の原体験→行きたい方向性→なぜコンサルかを一本の線でつなぐ。' },

          { level: 'advanced', category: '選考手法', question: 'ケース面接で評価を下げやすい「悪い回答」として正しいのは?', options: ['最初にissueを定義する', '仮説なしで事実を列挙し続ける', 'MECEな切り口で構造化する', '面接官と対話しながら進める'], answer: 1, explanation: '「情報を並べるだけで結論に至らない」「切り口がMECEでない」「仮説が立っていない」が三大NG。仮説思考が評価軸の核。' },

          { level: 'advanced', category: 'キャリア', question: 'コンサルの「Up or Out」制度の本質は?', options: ['年功序列で全員が昇進する', '一定期間で昇進できないと退職が暗に求められる', '入社時に役職が決まっている', '希望すれば誰でも昇進できる'], answer: 1, explanation: '役職ごとに滞在年数の目安があり、次のレベルに届かない人は外で活躍するよう促される文化。その代わり退職後のキャリア形成は強い。' },
          { level: 'advanced', category: '戦略', question: '複数ファーム通過時の比較軸として不適切なのは?', options: ['得意領域(戦略/IT/オペレーション)', '案件の規模感・プロジェクト期間', '単なる初任給の金額差', 'カルチャー・評価制度・卒業後のキャリアパス'], answer: 2, explanation: '初任給は短期的指標。得意領域・プロジェクト性質・退職後キャリア・カルチャー適合が長期キャリアに効く。' },
        ]
      },
      ib: {
        name: '外資投資銀行', nameEn: 'INVESTMENT BANKING', description: 'Goldman Sachs, Morgan Stanley等',
        questions: [
          { level: 'basic', category: '業界基礎', question: '外資系投資銀行の「Bulge Bracket」に含まれる代表3社は?', options: ['Goldman Sachs, Morgan Stanley, JP Morgan', 'Deloitte, PwC, EY', 'Sony, Toyota, Honda', 'McKinsey, BCG, Bain'], answer: 0, explanation: 'Bulge BracketはGS / MS / JPMを筆頭に、BofA、Citi等のグローバル大手。最上位ティアのIBを指す。' },
          { level: 'basic', category: '業界基礎', question: '「IBD」とは何の略?', options: ['International Business Department', 'Investment Banking Division(M&A・資金調達アドバイザリー)', 'Internal Bond Distribution', 'Industrial Bank Division'], answer: 1, explanation: 'Investment Banking Division。企業のM&A助言や株式・債券発行による資金調達を担う、IBの象徴的な部門。' },
          { level: 'basic', category: '業界基礎', question: '外銀の部門「S&T」が指すのは?', options: ['Strategy & Tactics', 'Sales & Trading(市場部門)', 'Service & Technology', 'Securities & Treasury'], answer: 1, explanation: 'Sales & Trading。機関投資家向けに株式・債券・為替等の売買を行う市場部門。IBDと並ぶフロントオフィスの二大部門。' },
          { level: 'basic', category: 'タイミング', question: '28卒の外銀サマーインターン エントリー時期の特徴は?', options: ['日系と同じ4〜6月中心', '外銀は特に早く、2025年末〜2026年春にかけて締切も', '秋以降にゆっくり始まる', 'エントリーは年中可能'], answer: 1, explanation: '外銀は選考時期がグローバルスケジュールに準拠し、日系より早い。志望者はM0/B2段階からの準備も珍しくない。' },
          { level: 'basic', category: '業界基礎', question: 'IB選考で頻出の「Front Office」に含まれない職種は?', options: ['IBD(投資銀行業務)', 'S&T(セールス&トレーディング)', 'Research(調査部)', 'バックオフィス決済業務'], answer: 3, explanation: 'Front OfficeはIBD、S&T、Research等の収益直結部門。決済・オペレーションはBack Office、リスク管理等はMiddle Office。' },
          { level: 'basic', category: '選考フロー', question: '外銀選考を象徴する「Superday」とは?', options: ['社内親睦イベント', '最終選考。1日で複数人と連続面接する', '内定者懇親会', 'ランダムな面接日'], answer: 1, explanation: '最終面接ステージで、MDや各部門のシニアと1日に5〜10本の連続面接を行う。通過すればオファー獲得。' },
          { level: 'intermediate', category: '選考手法', question: 'IB選考のCover Letterで最も重要な要素は?', options: ['文学的な表現', 'Why Banking / Why This Firm / Why Youの一貫性', '豪華な経歴', '使う英単語の難しさ'], answer: 1, explanation: 'なぜ業界を選ぶか、なぜそのファームか、なぜ自分が適任か、この3点の論理的接続がCover Letterの命。' },
          { level: 'intermediate', category: '選考手法', question: '外銀の「Technical面接」で最低限必要な知識は?', options: ['プログラミング言語', 'DCF・Comps・M&A basicsなどのバリュエーション', 'マーケティング理論', '国際政治'], answer: 1, explanation: 'DCF(割引キャッシュフロー)、類似会社比較(Comps)、M&Aの基礎的な会計処理などは頻出。市販Technical Guideが有効。' },
          { level: 'intermediate', category: '選考フロー', question: '外銀サマーインターンの典型的な期間は?', options: ['1〜2週間(国内は特に短期)', '3ヶ月以上', '1日のみ', '6ヶ月以上'], answer: 0, explanation: '日本の外銀サマーは1〜2週間が主流。グローバルの米英式10週間と異なり、時間密度が極めて高い。' },
          { level: 'intermediate', category: '業界基礎', question: 'IBDの中で「ECM」が担うのは?', options: ['M&Aアドバイザリー', '株式発行(IPO・PO・転換社債等)による資金調達', '債券発行', 'リサーチ発行'], answer: 1, explanation: 'Equity Capital Markets。株式発行を通じた資金調達。DCM(債券)と並ぶIBDの主要プロダクト。' },
          { level: 'intermediate', category: '戦略', question: '「Why Banking?」への答えとして最も弱いのは?', options: ['大型案件に若手から関与できる経験', '優秀な同僚からの学習環境', '高年収だから', 'Deal経験を通じた企業経営の俯瞰'], answer: 2, explanation: '年収は結果であって動機ではない。ディール関与・成長環境・企業ファイナンスへの知的興味など、業務内容と接続した動機が評価される。' },
          { level: 'intermediate', category: '選考手法', question: 'IB面接でのBehavioral面接で重要な要素は?', options: ['とにかく謙虚に話す', '具体的な行動・数値・結果を含むSTAR型で語る', '趣味の話を多くする', '成績の自慢'], answer: 1, explanation: 'Situation / Task / Action / Resultの型で、行動の具体性と再現性を示す。抽象的な美辞麗句より行動ベースの証拠が響く。' },
          { level: 'advanced', category: 'バリュエーション', question: 'DCFの3大構成要素は?', options: ['売上・利益・資産', 'FCF・割引率(WACC)・Terminal Value', 'PBR・PER・ROE', 'EBIT・EBITDA・EPS'], answer: 1, explanation: '将来のフリーキャッシュフロー(FCF)を加重平均資本コスト(WACC)で割り引き、継続価値(TV)を加えて企業価値を算出する。' },
          { level: 'advanced', category: 'バリュエーション', question: 'EV/EBITDAが実務で好まれる理由として正しいのは?', options: ['会計基準・資本構成の影響を受けにくく比較可能', '常にPERより高い数値になる', '計算が最も簡単', '日系企業しか使えない'], answer: 0, explanation: '減価償却方針や資本構成(負債/資本)に左右されにくいため、国際比較・同業比較に適する。Compsで頻用される倍率指標。' },
          { level: 'advanced', category: 'バリュエーション', question: 'LBO(Leveraged Buyout)の基本構造で正しいのは?', options: ['全額自己資金で買収する', '大量の負債を調達して少ない自己資金で買収し、買収後CFで返済', '株式交換のみで買収', '政府から資金を借りる'], answer: 1, explanation: 'PEファンドが買収対象の資産・CFを担保に借入を活用し、自己資本のレバレッジを効かせる。代表的なPE手法でIB選考でも頻出。' },
          { level: 'advanced', category: '選考手法', question: 'Modeling Testで典型的に問われるのは?', options: ['ExcelでDCFやMerger Modelを一定時間内に構築', 'PowerPointデザイン', 'タッチタイピング速度', 'SQL分析'], answer: 0, explanation: '企業概要情報からP/L、B/S、CFを連動させ、DCFやM&A Accretion/Dilutionを一定時間で構築する。Finance fluencyの最終チェック。' },
          { level: 'advanced', category: 'キャリア', question: 'IB出身者のPost-Bankingキャリアで典型的なのは?', options: ['永遠にIB勤務', 'PE / ヘッジファンド / 事業会社CFO等、ファイナンス周辺の転身', '全員がアカデミアに行く', '起業する人は極めて稀'], answer: 1, explanation: 'IBで培ったバリュエーション・モデリング・Deal実務はバイサイド(PE、HF)や事業会社ファイナンスで極めて再現性が高い。' },
        ]

          { level: 'basic', category: '業界基礎', question: '総合商社の現在の主要収益源は?', options: ['伝統的な商品トレーディングのみ', '事業投資＋トレーディングの両輪', '不動産賃貸のみ', '国からの補助金'], answer: 1, explanation: '従来の貿易仲介(トレーディング)から、世界各地の事業会社への投資・経営関与(事業投資)へとモデルが進化している。' },
          { level: 'basic', category: '業界基礎', question: '総合商社の収益に大きな影響を与える外部要因は?', options: ['コモディティ価格(原油・金属・穀物等)', '国内ファッショントレンド', '国内携帯電話販売台数', '国内テレビ視聴率'], answer: 0, explanation: '資源・エネルギー・食料等のコモディティ価格が業績を大きく左右。そのため非資源ビジネス強化が各社の重要戦略。' },

      for (let i = a.length - 1; i > 0; i--) {

          setCount(countOptions[countOptions.length - 1] || 3);

        const pool = quizBank[industry].questions.filter(q => q.level === level);

                          onClick={() => setLevel(lv.key)}
                          className={`text-center p-3 md:p-4 border-2 border-dark transition-all duration-150 ${isActive ? 'bg-dark text-surface shadow-brutal-accent' : 'bg-surface text-dark hover:-translate-y-[2px] hover:shadow-brutal-dark'} active:translate-y-0 active:shadow-none`}
                        >
                          <div className={`text-[10px] tracking-widest mb-1 ${isActive ? 'text-muted' : 'text-sub'}`}>LV.{i + 1}</div>
                          <div className="font-serif font-bold text-base md:text-lg">{lv.label}</div>
                          <div className="text-[10px] mt-1 leading-tight opacity-80">{lv.description}</div>
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* STEP 03 */}
                <div className="mb-8">
                  <div className="flex items-baseline gap-2 mb-3 flex-wrap">
                    <span className="text-[10px] tracking-[0.3em] text-sub">STEP 03</span>
                    <span className="text-sm font-bold text-dark">問題数を選ぶ</span>
                    <span className="text-[10px] ml-auto text-sub">最大{availablePool.length}問</span>
                  </div>
                  <div className="grid grid-cols-3 gap-3">
                    {countOptions.map(n => {
                      const isActive = count === n;
                      return (
                        <button
                          key={n}
                          onClick={() => setCount(n)}
                          className={`text-center p-3 md:p-4 border-2 border-dark transition-all duration-150 ${isActive ? 'bg-dark text-surface shadow-brutal-accent' : 'bg-surface text-dark hover:-translate-y-[2px] hover:shadow-brutal-dark'} active:translate-y-0 active:shadow-none`}
                        >
                          <div className="font-display text-[1.5rem] font-black">
                            {n}<span className="text-xs ml-1 font-normal">問</span>
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>

                <button
                  onClick={startQuiz}
                  className="w-full py-5 text-lg font-bold tracking-wider border-2 border-dark bg-dark text-surface shadow-brutal-accent transition-all duration-150 hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-brutal-accent-sm active:translate-x-[4px] active:translate-y-[4px] active:shadow-none"
                >
                  START →
                </button>
              </div>

              <div className="text-center mt-5 text-[10px] tracking-widest text-sub">
                ISSUED APRIL 2026 · SUMMER SELECTION STUDY DECK
              </div>
            </div>
          </div>
        );
      }

      // ============================================================
      // QUIZ SCREEN
      // ============================================================
      if (screen === 'quiz') {
        const q = questions[currentQ];
        const progress = ((currentQ + (selected !== null ? 1 : 0)) / questions.length) * 100;
        const isCorrect = selected === q.answer;
        const currentIndustry = quizBank[industry];
        const currentLevel = levelList.find(l => l.key === level);

        return (
          <div className="flex items-center justify-center p-4 md:p-8 min-h-screen">
            <div className="w-full max-w-3xl">
              <div className="mb-6">
                <div className="flex items-center justify-between flex-wrap gap-2 mb-3">
                  <div className="flex items-baseline gap-3">
                    <span className="text-[10px] tracking-[0.3em] text-sub">QUESTION</span>
                    <span className="font-display text-[1.5rem] font-black text-dark">{String(currentQ + 1).padStart(2, '0')}</span>
                    <span className="text-sm text-sub">/ {questions.length}</span>
                  </div>
                  <div className="flex gap-2 flex-wrap">
                    <span className="text-[10px] tracking-widest px-2 py-1 border border-dark text-dark bg-surface">{currentIndustry.name}</span>
                    <span className="text-[10px] tracking-widest px-2 py-1 bg-dark text-surface">{currentLevel.label}</span>
                    <span className="text-[10px] tracking-widest px-2 py-1 border border-dark text-dark bg-surface">{q.category}</span>
                  </div>
                </div>
                <div className="h-1.5 w-full border border-dark bg-surface">
                  <div className="h-full transition-all duration-500 bg-accent" style={{ width: `${progress}%` }} />
                </div>
              </div>

              <div className={`border-2 border-dark bg-surface shadow-brutal-dark-lg p-6 md:p-10 mb-5 transition-all duration-500 ${fadeIn ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`}>
                <h2 className="font-serif leading-snug mb-8 text-[clamp(1.2rem,3vw,1.7rem)] font-bold text-dark">
                  {q.question}
                </h2>

                <div className="space-y-4">
                  {q.options.map((opt, idx) => {
                    const isSelected = selected === idx;
                    const isRight = idx === q.answer;
                    const showResult = selected !== null;

                    let btnClass = "w-full text-left p-4 md:p-5 border-2 flex items-center gap-4 transition-all duration-200 ";
                    let badgeClass = "shrink-0 w-9 h-9 flex items-center justify-center font-bold text-sm border-2 border-dark ";

                    if (showResult) {
                      if (isRight) {
                        btnClass += "bg-correctbg border-success text-dark";
                        badgeClass += "bg-success text-surface border-success";
                      } else if (isSelected) {
                        btnClass += "bg-error border-accent text-dark";
                        badgeClass += "bg-accent text-surface border-accent";
                      } else {
                        btnClass += "bg-surface border-dark text-dark opacity-50";
                        badgeClass += "bg-surface text-dark";
                      }
                    } else {
                      btnClass += "bg-surface border-dark text-dark hover:-translate-y-[2px] hover:shadow-brutal-dark cursor-pointer active:translate-y-0 active:shadow-none";
                      badgeClass += "bg-surface text-dark";
                    }

                    return (
                      <button key={idx} onClick={() => chooseAnswer(idx)} disabled={showResult} className={btnClass}>
                        <span className={badgeClass}>{String.fromCharCode(65 + idx)}</span>
                        <span className="flex-1 text-sm md:text-base font-medium">{opt}</span>
                        {showResult && isRight && <span className="shrink-0 text-xl font-bold text-success">○</span>}
                        {showResult && isSelected && !isRight && <span className="shrink-0 text-xl font-bold text-accent">×</span>}
                      </button>
                    );
                  })}
                </div>
              </div>

              {selected !== null && (
                <div className={`border-2 p-5 md:p-7 mb-5 animate-slide-up ${isCorrect ? 'bg-correctbg border-success shadow-brutal-success' : 'bg-surface border-accent shadow-brutal-error'}`}>
                  <div className="flex items-center gap-3 mb-3">
                    <span className={`px-3 py-1 text-[10px] tracking-widest font-bold text-surface ${isCorrect ? 'bg-success' : 'bg-accent'}`}>
                      {isCorrect ? 'CORRECT' : 'INCORRECT'}
                    </span>
                    <span className="text-[10px] tracking-widest text-sub">EXPLANATION</span>
                  </div>
                  <p className="text-sm md:text-base leading-relaxed text-dark">{q.explanation}</p>
                </div>
              )}

              {selected !== null && (
                <button
                  onClick={nextQuestion}
                  className="w-full py-5 text-base font-bold tracking-wider border-2 border-dark bg-dark text-surface shadow-brutal-accent transition-all duration-150 hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-brutal-accent-sm active:translate-x-[4px] active:translate-y-[4px] active:shadow-none animate-slide-up"
                >
                  {currentQ < questions.length - 1 ? '次の問題へ →' : '結果を見る →'}
                </button>
              )}
            </div>
          </div>
        );
      }

      // ============================================================
      // FINAL / REVIEW SCREEN (結果と解説)
      // ============================================================
      if (screen === 'final') {
        const msg = scorePercent >= 90 ? { title: '完璧です', sub: 'エントリー準備に進んでOK', color: 'text-success', bar: 'bg-success' }
                  : scorePercent >= 70 ? { title: '十分な基礎力', sub: '細部を詰めつつ実戦へ', color: 'text-warning', bar: 'bg-warning' }
                  : { title: 'ここから', sub: '今すぐ業界研究スタート', color: 'text-accent', bar: 'bg-accent' };
        
        return (
          <div className="flex items-center justify-center p-4 md:p-8 min-h-screen">
            <div className="w-full max-w-3xl">
              <div className={`border-2 border-dark bg-surface shadow-brutal-dark-lg p-6 md:p-12 transition-all duration-700 ${fadeIn ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`}>
                <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
                  <div className="text-xs tracking-[0.3em] text-sub">RESULT</div>
                  <div className="text-[10px] tracking-widest text-sub">{quizBank[industry].nameEn}</div>
                </div>

                <h2 className="font-serif mb-8 text-[clamp(1.8rem,5vw,3.2rem)] font-extrabold text-dark leading-tight">
                  {msg.title}<span className={msg.color}>.</span>
                </h2>

                <div className="flex items-end gap-6 mb-8 pb-8 border-b-2 border-dark">
                  <div>
                    <div className="text-[10px] tracking-widest mb-1 text-sub">SCORE</div>
                    <div className="font-display text-[clamp(3.5rem,11vw,6rem)] font-black text-dark leading-none">
                      {correctCount}<span className="text-sub text-[0.4em] ml-2">/ {questions.length}</span>
                    </div>
                  </div>
                  <div className="flex-1 pb-3">
                    <div className="text-[10px] tracking-widest mb-1 text-sub">ACCURACY</div>
                    <div className={`font-display text-[clamp(1.4rem,4vw,2.25rem)] font-bold ${msg.color}`}>
                      {scorePercent}<span className="text-base">%</span>
                    </div>
                    <div className="mt-2 h-1.5 w-full bg-muted border border-dark">
                      <div className={`h-full transition-all duration-1000 ${msg.bar}`} style={{ width: `${scorePercent}%` }} />
                    </div>
                  </div>
                </div>

                <p className="text-sm md:text-base mb-8 leading-relaxed text-dark font-medium">{msg.sub}</p>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">
                  <button onClick={restart} className="py-4 text-sm font-bold tracking-wider border-2 border-dark bg-dark text-surface shadow-brutal-accent transition-all duration-150 hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-brutal-accent-sm active:translate-x-[4px] active:translate-y-[4px] active:shadow-none">
                    別の条件で挑戦 →
                  </button>
                  <button onClick={() => setScreen('review')} className="py-4 text-sm font-bold tracking-wider border-2 border-dark bg-surface text-dark shadow-brutal-dark transition-all duration-150 hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_#1C1C1E] active:translate-x-[4px] active:translate-y-[4px] active:shadow-none">
                    全問解説を見る
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (screen === 'review') {
        return (
          <div className="p-4 md:p-8 min-h-screen">
            <div className="w-full max-w-3xl mx-auto">
              <div className="flex items-center gap-3 mb-8">
                <div className="h-px flex-1 bg-dark" />
                <span className="tracking-[0.3em] text-xs font-bold text-dark">ALL EXPLANATIONS</span>
                <div className="h-px flex-1 bg-dark" />
              </div>
              <div className="space-y-6">
                {questions.map((q, i) => {
                  const wasCorrect = answers[i]?.correct;
                  return (
                    <div key={i} className="border-2 border-dark bg-surface shadow-brutal-dark p-5 md:p-6">
                      <div className="flex items-start gap-4 mb-4">
                        <span className={`shrink-0 w-10 h-10 flex items-center justify-center font-bold border-2 border-dark ${wasCorrect ? 'bg-success text-surface' : 'bg-accent text-surface'}`}>
                          {wasCorrect ? '○' : '×'}
                        </span>
                        <div className="flex-1 pt-1">
                          <div className="text-[10px] tracking-widest mb-1 text-sub">Q.{String(i + 1).padStart(2, '0')} / {q.category}</div>
                          <div className="font-bold text-base leading-snug text-dark">{q.question}</div>
                        </div>
                      </div>
                      <div className="bg-muted border border-dark p-3 md:p-4 mb-3">
                        <span className="text-[10px] font-bold tracking-widest block mb-1 text-sub">正解</span>
                        <div className="font-bold text-sm md:text-base text-dark">{q.options[q.answer]}</div>
                      </div>
                      <p className="text-sm leading-relaxed text-dark font-medium">{q.explanation}</p>
                    </div>
                  );
                })}
              </div>
              <button onClick={restart} className="w-full mt-8 py-5 text-sm font-bold tracking-wider border-2 border-dark bg-dark text-surface shadow-brutal-accent transition-all duration-150 hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-brutal-accent-sm active:translate-x-[4px] active:translate-y-[4px] active:shadow-none">
                最初に戻る →
              </button>
            </div>
          </div>
        );
      }
      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SummerSelectionQuiz />);
  </script>
</body>
</html>
