});

function calcPhase1(answers) {
  const s = { what: 0, become: 0, how: 0, get: 0 };
  answers.forEach((v, i) => { s[v] += W[i]; });
  let best = null, bestS = -1;
  Object.keys(s).forEach(k => { if (s[k] > bestS) { bestS = s[k]; best = k; } });
  return best;
}

function calcPhase2(answers, p1) {
  const subKeys = {
    what:   ["industry", "role", "customer", "style"],
    become: ["speed", "skill", "career", "learning"],
    how:    ["culture", "people", "freedom", "place"],
    get:    ["money", "stable", "brand", "mission"]
  }[p1];
  const s = {};
  subKeys.forEach(k => { s[k] = 0; });
  answers.forEach((v, i) => { s[v] += W[i]; });
  let best = null, bestS = -1;
  Object.keys(s).forEach(k => { if (s[k] > bestS) { bestS = s[k]; best = k; } });
  return best;
}

function Diagnosis() {
  const [stage, setStage] = useState("start");
  const [p1Answers, setP1Answers] = useState([]);
  const [p2Answers, setP2Answers] = useState([]);
  const [p1Winner, setP1Winner] = useState(null);

  function start() {
    setStage("phase1"); setP1Answers([]); setP2Answers([]); setP1Winner(null);
  }
  function pick(value) {
    if (stage === "phase1") {
      const next = p1Answers.concat([value]);
      setP1Answers(next);
      if (next.length >= 5) {
        const w = calcPhase1(next);
        setP1Winner(w);
        setTimeout(() => setStage("phase2"), 220);
      }
    } else if (stage === "phase2") {
      const next = p2Answers.concat([value]);
      setP2Answers(next);
      if (next.length >= 5) {
        setTimeout(() => setStage("result"), 220);
      }
    }
  }
  function back() {
    if (stage === "phase1") {
      if (p1Answers.length === 0) return;
      setP1Answers(p1Answers.slice(0, -1));
    } else if (stage === "phase2") {
      if (p2Answers.length === 0) {
        setStage("phase1"); setP1Winner(null);
        setP1Answers(p1Answers.slice(0, -1));
      } else {
        setP2Answers(p2Answers.slice(0, -1));
      }
    }
  }
  function restart() {
    setStage("start"); setP1Answers([]); setP2Answers([]); setP1Winner(null);
  }

  let currentQ = null;
  if (stage === "phase1") currentQ = PHASE1_QUESTIONS[p1Answers.length];
  if (stage === "phase2" && p1Winner) currentQ = PHASE2_QUESTIONS[p1Winner][p2Answers.length];

  const totalAnswered = p1Answers.length + p2Answers.length;
  const totalQuestions = 10;

  let finalType = null;
  if (stage === "result" && p1Winner) {
    const p2Winner = calcPhase2(p2Answers, p1Winner);
    finalType = TYPES[p1Winner + "-" + p2Winner];
  }

  const animKey = stage + "-" + (stage === "phase1" ? p1Answers.length : stage === "phase2" ? p2Answers.length : "x");

  return (
    <div className="cc-app">
      <div className="cc-container">

        <header className="cc-masthead">
          <div>
            <div className="cc-mast-eyebrow">Career Compass / 28卒 Edition</div>
            <div className="cc-mast-title serif-jp">就活の軸、診断</div>
          </div>
          <div>
            <div className="cc-mast-meta num">Vol.02</div>
            <div className="cc-mast-meta-sub num">10 questions · 16 types</div>
          </div>
        </header>

        <div className="cc-rule cc-mb-10" />

        {stage === "start" && (
          <section key="start" className="anim-fade-up">
            <div className="cc-intro-tag num">— INTRODUCTION</div>
            <h1 className="cc-intro-h1 serif-jp">
              あなたの就活の軸を、<br />
              <span className="accent">16匹</span>の動物にたとえると。
            </h1>
            <p className="cc-intro-p">
              就活の軸は、一つに決めるものではありません。複数の価値観の「優先順位」を見極めることで、あなたが本当に大事にしているものが見えてきます。<br />
              この10問は、まず<span className="serif-jp ink">4つの大カテゴリ</span>であなたの傾向を見極め、その中の<span className="serif-jp ink">16タイプ</span>のどこに位置するかを明らかにします。
            </p>

            <div className="cc-hair cc-mb-10" />

            <div className="cc-cat-grid">
              {Object.keys(PHASE1_CATS).map((k, i) => (
                <div key={k} className="cc-cat-item">
                  <div className="cc-cat-no num">{String(i + 1).padStart(2, "0")}</div>
                  <div className="cc-cat-jp serif-jp">{PHASE1_CATS[k].label}</div>
                  <div className="cc-cat-en serif-en">{PHASE1_CATS[k].en}</div>
                </div>
              ))}
            </div>

            <div className="cc-hair cc-mb-10" />

            <div className="cc-mb-10">
              <div className="cc-peek-label">16 Animals · ひとつだけ、あなたの動物</div>
              <div className="cc-peek-grid">
                {Object.keys(TYPES).map(k => (
                  <AnimalThumb key={k} type={TYPES[k]} size={38} active={false} />
                ))}
              </div>
            </div>

            <div className="cc-final-note-row">
              <div className="cc-begin-note">所要時間：約 3 分</div>
              <button className="cc-btn-primary" onClick={start}>Begin →</button>
            </div>
          </section>
        )}

        {(stage === "phase1" || stage === "phase2") && currentQ && (
          <section key={animKey} className="anim-fade-up-q">
            <div className="cc-q-progress-row">
              <div className="cc-q-counter num">
                Q. {String(totalAnswered + 1).padStart(2, "0")} / {totalQuestions}
              </div>
              <div className="cc-progress-dots">
                {Array.from({ length: totalQuestions }).map((_, i) => (
                  <div key={i} className="cc-progress-dot" style={{
                    background: i < totalAnswered ? "#8B2E2A" : i === totalAnswered ? "#2A2421" : "rgba(42, 36, 33, 0.12)"
                  }} />
                ))}
              </div>
            </div>

            <div className="cc-q-phase num">
              {stage === "phase1"
                ? "PHASE 1 / 大カテゴリ"
                : "PHASE 2 / " + PHASE1_CATS[p1Winner].label + "の中で"}
            </div>

            <h2 className="cc-q-prompt serif-jp">{currentQ.prompt}</h2>
            {currentQ.note ? (
              <div className="cc-q-note">★ {currentQ.note}</div>
            ) : (
              <div className="cc-q-spacer" />
            )}

            <div className="cc-options">
              {currentQ.options.map((opt, i) => (
                <button key={i} onClick={() => pick(opt.value)} className="cc-option">
                  <span className="cc-option-letter num">{String.fromCharCode(65 + i)}.</span>
                  <span className="cc-option-label">{opt.label}</span>
                  <span className="cc-option-arrow">→</span>
                </button>
              ))}
            </div>

            {totalAnswered > 0 && (
              <button onClick={back} className="cc-back">← Back</button>
            )}
          </section>
        )}

        {stage === "result" && finalType && (
          <section key="result" className="anim-fade-up">
            <div className="cc-result-top anim-fade-in d-1">
              <div className="cc-result-tag num">— RESULT</div>
              <div className="cc-result-type-no num">
                TYPE {String(finalType.no).padStart(2, "0")} / 16
              </div>
            </div>

            <div className="cc-hero anim-scale-in d-2">
              <AnimalCard type={finalType} size={200} />
              <div className="cc-hero-en serif-en">{finalType.en}</div>
              <h1 className="cc-hero-name serif-jp">{finalType.name}</h1>
              <div className="cc-hero-catch serif-jp">―― {finalType.catch} ――</div>
            </div>

            <div className="cc-hair cc-mb-8" />

            <div className="cc-breadcrumb anim-fade-in d-4">
              <div className="cc-breadcrumb-item">
                <div className="cc-breadcrumb-label num">BIG CATEGORY</div>
                <div className="cc-breadcrumb-jp serif-jp" style={{ color: "#8B2E2A" }}>
                  {PHASE1_CATS[p1Winner].label}
                </div>
                <div className="cc-breadcrumb-en serif-en">{PHASE1_CATS[p1Winner].en}</div>
              </div>
              <div className="cc-breadcrumb-sep">›</div>
              <div className="cc-breadcrumb-item">
                <div className="cc-breadcrumb-label num">YOUR ANIMAL</div>
                <div className="cc-breadcrumb-jp serif-jp">{finalType.name}</div>
                <div className="cc-breadcrumb-en serif-en">{finalType.en}</div>
              </div>
            </div>

            <div className="cc-hair cc-mb-10" />

            <div className="cc-detail-grid anim-fade-up-sm d-5">
              <div className="cc-detail-label">Who you are</div>
              <div className="cc-detail-body">{finalType.detail}</div>
            </div>

            <div className="cc-hair cc-mb-10" />

            <div className="cc-detail-grid anim-fade-up-sm d-6">
              <div className="cc-detail-label">Good Fit · Industry</div>
              <div className="cc-detail-body-jp serif-jp">{finalType.fitIndustry}</div>
            </div>

            <div className="cc-hair cc-mb-10" />

            <div className="cc-detail-grid anim-fade-up-sm d-7">
              <div className="cc-detail-label">Good Fit · Role</div>
              <div className="cc-detail-body-jp serif-jp">{finalType.fitRole}</div>
            </div>

            <div className="cc-rule cc-mb-10" />

            <div className="anim-fade-in d-8">
              <div className="cc-map-label">16 Animals Map</div>
              <p className="cc-map-desc">
                4つの大カテゴリ × 各4タイプ = 計16タイプ。あなたの位置にハイライトがついています。
              </p>

              {Object.keys(PHASE1_CATS).map((catKey, catIdx) => {
                const types = Object.keys(TYPES)
                  .filter(k => k.indexOf(catKey + "-") === 0)
                  .map(k => TYPES[k]);
                return (
                  <div key={catKey} className="cc-map-group">
                    <div className="cc-map-group-head">
                      <div className="cc-map-group-no num">{String(catIdx + 1).padStart(2, "0")}</div>
                      <div className="cc-map-group-jp serif-jp">{PHASE1_CATS[catKey].label}</div>
                      <div className="cc-map-group-en serif-en">{PHASE1_CATS[catKey].en}</div>
                    </div>
                    <div className="cc-type-grid">
                      {types.map(t => {
                        const isActive = t.no === finalType.no;
                        return (
                          <div key={t.no} className={"cc-type-card" + (isActive ? " active" : "")}>
                            <AnimalThumb type={t} size={36} active={isActive} />
                            <div className="cc-type-card-body">
                              <div className="cc-type-card-no num">{String(t.no).padStart(2, "0")}</div>
                              <div className="cc-type-card-name serif-jp">{t.name}</div>
                              <div className="cc-type-card-catch">{t.catch}</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>

            <div className="cc-rule cc-mb-10" />

            <div className="cc-final-note-row anim-fade-in d-9">
              <div className="cc-final-note">
                ※ 診断結果は、あなたの軸を言語化する入り口です。<br />
                業界・職種はあくまで例として参考に。
              </div>
              <button className="cc-btn-primary" onClick={restart}>Retake ↺</button>
            </div>
          </section>
        )}

        <footer className="cc-footer">
          <div className="cc-hair" style={{ marginBottom: 16 }} />
          <div className="cc-footer-row">
            <div className="cc-footer-left">— Career Compass / 早稲田総合研究会</div>
            <div className="cc-footer-right num">002 / ANIMALS</div>
          </div>
        </footer>

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Diagnosis />);
</script>
</body>
</html>
